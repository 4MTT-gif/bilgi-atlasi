<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="YKS ve KPSS'ye yönelik coğrafya testleri. Türkiye haritası üzerinde il, bölge, göl, dağ ve toprak türü bulma oyunları.">
  <title>Bilgi Atlası — YKS &amp; KPSS Coğrafya</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ANA MENÜ -->
  <section id="menu-screen" class="screen active">
    <div class="menu-inner">
      <header class="menu-header">
        <div class="logo-badge">🧭</div>
        <h1>Bilgi Atlası</h1>
        <p class="subtitle">YKS &amp; KPSS · Harita üzerinde öğren</p>
      </header>
      <div class="menu-cards">
        <button class="menu-card accent-cografya" id="btn-cografya">
          <span class="card-icon">🌍</span>
          <span class="card-body">
            <span class="card-title">Coğrafya</span>
            <span class="card-desc">İller, bölgeler, göller, dağlar ve toprak türleri — hepsi harita üzerinde.</span>
          </span>
          <span class="card-arrow">›</span>
        </button>
        <button class="menu-card disabled" disabled>
          <span class="card-icon">📜</span>
          <span class="card-body">
            <span class="card-title">Tarih</span>
            <span class="card-desc">Yakında…</span>
          </span>
        </button>
      </div>
      <footer class="menu-footer">
        Harita: <a href="https://github.com/dnomak/svg-turkiye-haritasi" target="_blank" rel="noopener">dnomak/svg-turkiye-haritasi</a> (MIT)
      </footer>
    </div>
  </section>

  <!-- COĞRAFYA ALT MENÜSÜ -->
  <section id="cografya-screen" class="screen">
    <div class="menu-inner">
      <header class="submenu-header">
        <button class="btn-back" data-back="menu">‹ Geri</button>
        <h2>🌍 Coğrafya</h2>
        <span class="submenu-hint">Bir mod seç</span>
      </header>
      <div id="topic-container"><!-- JS ile kategorilere göre doldurulur --></div>
      <footer class="menu-footer">
        Tek deneme hakkı olan modlarda dikkatli seç — ilk tıklaman geçerli!
      </footer>
    </div>
  </section>

  <!-- OYUN EKRANI -->
  <section id="game-screen" class="screen">
    <header class="game-header">
      <button id="btn-menu" class="btn-small" title="Coğrafya menüsüne dön">✕</button>
      <div class="mode-pill"><span id="mode-pill-icon">🗺️</span><span id="mode-pill-name">Mod</span></div>
      <div class="target-box">
        <span class="target-label">Bul:</span>
        <span id="target-name" class="target-name">—</span>
      </div>
      <div class="stats">
        <span id="stat-score" class="stat" title="Puan">⭐ 0</span>
        <span id="stat-correct" class="stat" title="Doğru">✅ 0</span>
        <span id="stat-wrong" class="stat" title="Yanlış">❌ 0</span>
        <span id="stat-progress" class="stat" title="İlerleme">0/0</span>
        <span id="stat-tries" class="stat" title="Kalan deneme">💙</span>
      </div>
    </header>

    <div id="progress-track"><div id="progress-fill"></div></div>

    <div id="map-wrap">
      <div id="map-container"></div>
      <div id="tooltip" class="tooltip hidden"></div>
      <div class="zoom-controls">
        <button id="zoom-in" title="Yakınlaştır">+</button>
        <button id="zoom-out" title="Uzaklaştır">−</button>
        <button id="zoom-reset" title="Sıfırla">⤢</button>
      </div>
    </div>

    <div id="feedback-bar" class="feedback-bar">Haritadan seç</div>
  </section>

  <!-- SONUÇ EKRANI -->
  <section id="result-screen" class="screen">
    <div class="result-box">
      <div id="result-emoji" class="result-emoji">🎉</div>
      <h2 id="result-title">Tebrikler!</h2>
      <p id="result-sub" class="result-sub">Modu tamamladın.</p>
      <div class="result-stats">
        <div class="result-stat"><span id="result-score">0</span><label>Puan</label></div>
        <div class="result-stat"><span id="result-correct">0</span><label>Doğru</label></div>
        <div class="result-stat"><span id="result-wrong">0</span><label>Bilinemeyen</label></div>
      </div>
      <div id="result-missed" class="result-missed hidden">
        <h3>Bilemediklerin:</h3>
        <p id="missed-list"></p>
      </div>
      <div class="result-buttons">
        <button id="btn-again" class="btn-primary">🔄 Tekrar Oyna</button>
        <button id="btn-modes" class="btn-secondary">🌍 Coğrafya</button>
        <button id="btn-result-menu" class="btn-secondary">🏠 Ana Menü</button>
      </div>
    </div>
  </section>

  <script src="js/turkiye-map.js"></script>
  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
